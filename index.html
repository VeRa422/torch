<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Artifact Studio</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Philosopher&family=Montserrat:wght@400;600;700&family=Playfair+Display:wght@700&family=Lobster&family=Pacifico&family=Oswald:wght@500&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root{ --gold: #FFD700; --gold-dark: #B8860B; --bg-dark: #0a0a0a; --panel: #1a1a1a; --text: #e0e0e0; }
    *{box-sizing:border-box}
    body, html { margin:0; height: 100%; font-family:'Montserrat', sans-serif; background: #000; color: var(--text); overflow: hidden; }
    .app-container { display: flex; height: 100vh; width: 100vw; }
    
    .editor-side { width: 480px; min-width: 480px; background: var(--panel); border-right: 2px solid var(--gold-dark); display: flex; flex-direction: column; z-index: 10; }
    .editor-header { padding: 12px; background: var(--bg-dark); border-bottom: 1px solid #333; text-align: center; }
    .editor-header h1 { margin: 0; font-family: 'Cinzel Decorative'; font-size: 18px; color: var(--gold); }
    
    .tabs-nav { display: flex; background: #111; border-bottom: 1px solid #333; flex-wrap: wrap; }
    .tab-btn { flex: 1; padding: 10px 5px; background: none; border: none; color: #777; cursor: pointer; font-size: 9px; text-transform: uppercase; font-weight: bold; }
    .tab-btn.active { color: var(--gold); border-bottom: 2px solid var(--gold); background: rgba(255,215,0,0.05); }
    .tab-content { flex: 1; overflow-y: auto; padding: 15px 20px; scroll-behavior: smooth; }
    .tab-pane { display: none; }
    .tab-pane.active { display: block; }

    .field-group { margin-bottom: 10px; }
    .field-group.row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    label { display: block; font-size: 9px; color: var(--gold-dark); text-transform: uppercase; margin-bottom: 3px; font-weight: bold; }
    input, textarea, select { width: 100%; background: #000; border: 1px solid #333; padding: 7px; color: #fff; border-radius: 6px; font-size: 12px; }
    input[type="color"] { height: 32px; padding: 2px; cursor: pointer; }
    h3 { font-size: 10px; color: #fff; text-transform: uppercase; border-bottom: 1px solid #333; padding-bottom: 4px; margin: 10px 0 8px 0; }
    
    .btn-group { display: flex; gap: 10px; padding: 12px 15px; background: #111; border-top: 1px solid #333;}
    .btn-action { flex: 1; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-family: 'Cinzel Decorative'; font-weight: bold; font-size: 11px; transition: 0.1s; }
    .btn-gold { background: var(--gold); color: #000; }
    .btn-copy { background: #333; color: #fff; }

    .studio-footer { padding: 10px 15px; background: var(--bg-dark); text-align: center; border-top: 1px solid #333; margin-top: auto; display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .footer-logo-img { height: 40px; object-fit: contain; }
    .footer-brand-text { font-family: 'Oswald', sans-serif; text-transform: uppercase; font-size: 11px; letter-spacing: 1.5px; color: #fff; margin: 0; }
    .footer-brand-text span { color: var(--gold); }
    .footer-copyright { font-size: 8px; color: #555; margin: 0; text-transform: uppercase; }

    .preview-side { flex: 1; background: #050505; display: flex; flex-direction: column; padding: 15px; gap: 10px; }
    .preview-frame-container { flex: 1; background: #000; border-radius: 12px; border: 1px solid #333; overflow: hidden; }
    iframe { width: 100%; height: 100%; border: none; }
    .checkbox-row { display: flex; align-items: center; gap: 8px; cursor: pointer; margin-bottom: 8px; font-size: 11px; }
  </style>
</head>
<body>
<div class="app-container">
  <div class="editor-side">
    <div class="editor-header"><h1>ARTIFACT STUDIO</h1></div>
    <div class="tabs-nav">
      <button class="tab-btn active" onclick="openTab(event, 'tab-visual')">Визуал</button>
      <button class="tab-btn" onclick="openTab(event, 'tab-audio')">Звук</button>
      <button class="tab-btn" onclick="openTab(event, 'tab-tasks')">Задания</button>
      <button class="tab-btn" onclick="openTab(event, 'tab-style')">Стиль</button>
      <button class="tab-btn" onclick="openTab(event, 'tab-lang')">Язык</button>
    </div>
    <div class="tab-content">
      <div id="tab-visual" class="tab-pane active">
        <label class="checkbox-row"><input type="checkbox" id="cfg_transparent"><span>Прозрачный фон</span></label>
        <label class="checkbox-row"><input type="checkbox" id="cfg_pulse" checked><span>Эффект полета жука</span></label>
        <div class="field-group"><label>Значок жизни (13.png)</label><input type="text" id="cfg_life_icon" value="13.png"></div>
        <div class="field-group row">
          <div><label>Кол-во жизней</label><input type="number" id="cfg_lives" value="3" min="1"></div>
          <div><label>Громкость (0.0-1.0)</label><input type="number" id="cfg_def_vol" step="0.1" value="0.5"></div>
        </div>
        <div class="field-group"><label>Фон (2.png)</label><input type="text" id="cfg_bg" value="2.png"></div>
        <div class="field-group"><label>Скарабей/Фонарь (1.png)</label><input type="text" id="cfg_cursor" value="1.png"></div>
        <div class="field-group"><label>Артефакты (через запятую)</label><textarea id="cfg_glyphs" rows="3">3.png, 4.png, 5.png, 6.png, 7.png, 8.png, 9.png, 10.png, 11.png, 12.png</textarea></div>
      </div>
      <div id="tab-audio" class="tab-pane">
        <div class="field-group"><label>1. Наводка</label><input type="text" id="s_1" value="1.mp3"></div>
        <div class="field-group"><label>2. Окно вопроса</label><input type="text" id="s_2" value="2.mp3"></div>
        <div class="field-group"><label>3. Правильно</label><input type="text" id="s_3" value="3.mp3"></div>
        <div class="field-group"><label>4. Ошибка</label><input type="text" id="s_4" value="4.mp3"></div>
        <div class="field-group"><label>5. Победа</label><input type="text" id="s_5" value="5.mp3"></div>
      </div>
      <div id="tab-tasks" class="tab-pane">
        <div class="field-group"><label>Вопросы (1 на строку)</label><textarea id="cfg_q" rows="6">The Sun God Ra traveled in a golden...&#10;Khepri represents which time of day?&#10;The Ankh is a symbol of...</textarea></div>
        <div class="field-group"><label>Ответы (правильный | неверный)</label><textarea id="cfg_a" rows="6">Boat | Chariot | Plane&#10;Morning | Evening | Night&#10;Eternal Life | Strength | War</textarea></div>
      </div>
      <div id="tab-style" class="tab-pane">
        <h3>Текст</h3>
        <div class="field-group row">
          <div><label>Шрифт вопроса</label>
            <select id="st_font_q">
              <option value="'Montserrat'">Montserrat</option><option value="'Roboto'">Roboto</option>
              <option value="'Philosopher'">Philosopher</option><option value="'Cinzel Decorative'">Cinzel</option>
              <option value="'Playfair Display'">Playfair Display</option>
            </select>
          </div>
          <div><label>Цвет вопроса</label><input type="color" id="st_color_q" value="#FFD700"></div>
        </div>
        <div class="field-group">
          <label>Шрифт ответов</label>
          <select id="st_font_a">
            <option value="'Montserrat'">Montserrat</option><option value="'Roboto'">Roboto</option>
            <option value="'Philosopher'">Philosopher</option><option value="'Cinzel Decorative'">Cinzel</option>
          </select>
        </div>
        <h3>Индикатор зарядки</h3>
        <div class="field-group row">
          <div><label>Цвет линии</label><input type="color" id="st_charge_clr" value="#FFD700"></div>
          <div><label>Цвет следа</label><input type="color" id="st_charge_trail" value="#333333"></div>
        </div>
        <div class="field-group row">
          <div><label>Толщина (1-15)</label><input type="number" id="st_charge_width" value="8"></div>
          <div><label>Время (мс)</label><input type="number" id="st_charge_dur" value="1500"></div>
        </div>
        <h3>Окно (Frame)</h3>
        <div class="field-group row">
          <div><label>Фон окна</label><input type="color" id="st_modal_bg" value="#1a1101"></div>
          <div><label>Цвет рамки</label><input type="color" id="st_modal_brd" value="#ffd700"></div>
        </div>
        <div class="field-group row">
          <div><label>Прозрачность (0-1)</label><input type="number" id="st_modal_op" value="1" step="0.1" min="0" max="1"></div>
          <div><label>Свечение (glow)</label><input type="color" id="st_modal_glw" value="#000000"></div>
        </div>
        <h3>Кнопки ответов</h3>
        <div class="field-group row">
          <div><label>Фон кнопки</label><input type="color" id="st_btn_bg" value="#000000"></div>
          <div><label>Текст кнопки</label><input type="color" id="st_btn_txt" value="#FFD700"></div>
        </div>
      </div>
      <div id="tab-lang" class="tab-pane">
        <div class="field-group"><label>Язык UI</label>
          <select id="cfg_ui_lang" onchange="updateLangFields()">
            <option value="ru">Русский</option><option value="en" selected>English</option><option value="de">Deutsch</option><option value="fr">Français</option><option value="it">Italiano</option><option value="es">Español</option><option value="zh">中文</option>
          </select>
        </div>
        <div class="field-group row">
          <div><label>Текст Победы</label><input type="text" id="ui_win" value="MISSION ACCOMPLISHED!"></div>
          <div><label>Текст Поражения</label><input type="text" id="ui_fail" value="YOU ARE CURSED!"></div>
        </div>
        <div class="field-group"><label>Restart</label><input type="text" id="ui_restart" value="RESTART"></div>
      </div>
    </div>
    <div class="btn-group">
      <button class="btn-action btn-gold" onclick="generate()">СГЕНЕРИРОВАТЬ</button>
      <button class="btn-action btn-copy" onclick="copyCode()">СКОПИРОВАТЬ</button>
    </div>
    <div class="studio-footer">
      <img src="https://raw.githubusercontent.com/VeRa422/hidden_artifacts/main/logo.png" alt="Logo" class="footer-logo-img">
      <p class="footer-brand-text"><span>ИГРОВОЙ</span> КВАРТАЛ</p>
      <p class="footer-copyright">© Все права защищены</p>
    </div>
  </div>
  <div class="preview-side">
    <div class="preview-frame-container"><iframe id="preview"></iframe></div>
    <textarea id="hidden_output" style="display:none;"></textarea>
  </div>
</div>
<script>
  const GITHUB = "https://raw.githubusercontent.com/VeRa422/hidden_artifacts/main/";
  const fixUrl = u => (u.startsWith("http") || !u || u.length < 5) ? u : GITHUB + u.trim();
  const hexToRgb = (hex, alpha) => {
     let r = parseInt(hex.slice(1, 3), 16), g = parseInt(hex.slice(3, 5), 16), b = parseInt(hex.slice(5, 7), 16);
     return `rgba(${r}, ${g}, ${b}, ${alpha})`;
  };
  const LANGS = {
    ru: { t: "Истина", f: "Ложь", r: "Заново", win: "Артефакты собраны!", fail: "Вы прокляты!" },
    en: { t: "True", f: "False", r: "Restart", win: "Mission Accomplished!", fail: "You are cursed!" },
    de: { t: "Wahr", f: "Falsch", r: "Neustart", win: "Mission Erfüllt!", fail: "Du bist verflucht!" },
    fr: { t: "Vrai", f: "Faux", r: "Recommencer", win: "Mission Réussie !", fail: "Vous êtes maudit !" },
    it: { t: "Vero", f: "Falso", r: "Reinizia", win: "Missione Compiuta!", fail: "Sei Maledetto!" },
    es: { t: "Verdad", f: "Falso", r: "Reiniciar", win: "¡Misión Cumplida!", fail: "¡Estás Maldito!" },
    zh: { t: "正确", f: "错误", r: "重新开始", win: "任务完成！", fail: "你被诅咒了！" }
  };
  function updateLangFields() {
    const l = LANGS[document.getElementById('cfg_ui_lang').value];
    document.getElementById('ui_win').value = l.win; document.getElementById('ui_fail').value = l.fail; document.getElementById('ui_restart').value = l.r;
  }
  function openTab(evt, name) {
    document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(name).classList.add('active'); evt.currentTarget.classList.add('active');
  }
  function generate() {
    const qList = document.getElementById('cfg_q').value.split('\n');
    const aList = document.getElementById('cfg_a').value.split('\n');
    const finalQs = qList.map((txt, i) => {
      let parts = (aList[i] || "True").split('|').map(s => s.trim()).filter(s => s);
      return { w: txt.trim(), a: parts[0], opts: parts };
    }).filter(x => x.w);
    const gRaw = document.getElementById('cfg_glyphs').value.split(',').map(s=>s.trim()).filter(s=>s);
    const gList = gRaw.length > 0 ? gRaw.map(fixUrl) : [fixUrl("3.png")];
    const uiLang = LANGS[document.getElementById('cfg_ui_lang').value];
    const modalBg = hexToRgb(document.getElementById('st_modal_bg').value, document.getElementById('st_modal_op').value);

    const gameHtml = `<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <script src="https://cdn.jsdelivr.net/npm/progressbar.js@1.1.0/dist/progressbar.min.js"><\/script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Philosopher&family=Montserrat:wght@400;600;700&family=Playfair+Display:wght@700&family=Lobster&family=Pacifico&family=Oswald:wght@500&family=Roboto:wght@400;700&display=swap');
    body, html { margin:0; padding:0; width:100%; height:100%; overflow:hidden; background:transparent; font-family:${document.getElementById('st_font_q').value}, sans-serif; cursor:none; }
    .tomb { position:relative; width:100vw; height:100vh; ${document.getElementById('cfg_transparent').checked ? "" : "background:url('"+fixUrl(document.getElementById('cfg_bg').value)+"') center/cover no-repeat;"} }
    #darkness { position:absolute; inset:0; background:radial-gradient(circle 200px at 50% 50%, transparent 10%, rgba(0,0,0,0.98) 100%); pointer-events:none; z-index:200; }
    #scarab { position:fixed; width:75px; height:75px; background:url('${fixUrl(document.getElementById('cfg_cursor').value)}') center/contain no-repeat; z-index:1000; transform:translate(-50%,-50%); pointer-events:none; filter:drop-shadow(0 0 10px gold); ${document.getElementById('cfg_pulse').checked ? "animation: beetleFlight 3s infinite ease-in-out;" : ""} }
    @keyframes beetleFlight { 0% { transform: translate(-50%, -50%) rotate(-3deg) scale(1); } 50% { transform: translate(-50%, -50%) rotate(3deg) scale(1.08); filter: drop-shadow(0 0 20px gold); } 100% { transform: translate(-50%, -50%) rotate(-3deg) scale(1); } }
    .glyph { position:absolute; width:65px; height:65px; z-index:300; background-size:contain; background-repeat:no-repeat; background-position:center; opacity:0; transition:0.4s; }
    .glyph.charging { opacity:1!important; transform:scale(1.1); filter:drop-shadow(0 0 15px gold); }
    .progress-container { position:absolute; width:85px; height:85px; top:-10px; left:-10px; pointer-events:none;}
    .ui-top { position:absolute; top:15px; width:100%; display:flex; flex-direction:column; align-items:center; z-index:500; }
    .slots { display:flex; gap:5px; margin-bottom:8px; flex-wrap:wrap; justify-content:center; }
    .slot { width:44px; height:44px; border:1px solid ${document.getElementById('st_modal_brd').value}; background:rgba(0,0,0,0.7); display:flex; align-items:center; justify-content:center; overflow:hidden; border-radius: 4px; }
    .slot .glyph { position:relative!important; top:0!important; left:0!important; opacity:1!important; width: 80% !important; height: 80% !important; transform: none !important; margin: 0 !important; filter: none !important;}
    .lives { display:flex; gap:8px; align-items: center; margin-top: 5px; }
    .life-icon-img { width: 28px; height: 28px; object-fit: contain; filter: drop-shadow(0 0 5px gold); }
    #vol { width: 80px; accent-color: gold; margin-top: 5px; cursor: pointer; pointer-events: auto; }
    .modal { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:360px; background:${modalBg}; border:2px solid ${document.getElementById('st_modal_brd').value}; padding:25px; text-align:center; z-index:2000; display:none; box-shadow:0 0 50px ${document.getElementById('st_modal_glw').value}; cursor:default; }
    #q { color: ${document.getElementById('st_color_q').value}; font-size: 19px; margin-bottom:20px; line-height: 1.4; font-weight: 600; }
    .btn { display:block; width:100%; padding:14px 10px; margin:10px 0; background:${document.getElementById('st_btn_bg').value}; border:1px solid ${document.getElementById('st_modal_brd').value}; color:${document.getElementById('st_btn_txt').value}; cursor:pointer; font-family:${document.getElementById('st_font_a').value}, sans-serif; font-size:14px; font-weight: 600; letter-spacing: 0.5px; transition: 0.2s; text-transform: none; }
    .btn:hover { background: #ffd700; color: #000; }
    @keyframes shake { 0%,100%{transform:translate(0,0)} 20%,60%{transform:translate(-10px,0)} 40%,80%{transform:translate(10px,0)} }
    .shake { animation: shake 0.4s; }
  </style>
</head>
<body>
  <div id="scarab"></div>
  <div class="tomb" id="stage">
    <div id="darkness"></div>
    <div class="ui-top">
      <div class="slots" id="slots"></div>
      <div class="lives" id="lives-box"></div>
      <input type="range" id="vol" min="0" max="1" step="0.1" value="${document.getElementById('cfg_def_vol').value}">
    </div>
    <div id="layer"></div>
    <div id="modal" class="modal"><h3 id="q"></h3><div id="ans-zone"></div></div>
    <div id="win" class="modal"><h2>${document.getElementById('ui_win').value}</h2><button class="btn" onclick="location.reload()">${document.getElementById('ui_restart').value}</button></div>
    <div id="fail" class="modal"><h2>${document.getElementById('ui_fail').value}</h2><button class="btn" onclick="location.reload()">${document.getElementById('ui_restart').value}</button></div>
  </div>
  <script>
    const glyphImgs = ${JSON.stringify(gList)}, questions = ${JSON.stringify(finalQs)};
    const snds = ["${fixUrl(document.getElementById('s_1').value)}", "${fixUrl(document.getElementById('s_2').value)}", "${fixUrl(document.getElementById('s_3').value)}", "${fixUrl(document.getElementById('s_4').value)}", "${fixUrl(document.getElementById('s_5').value)}"];
    let coll = 0, currentLives = ${parseInt(document.getElementById('cfg_lives').value)}, currG = null, actA = null, bar = null;
    const lIcon = "${fixUrl(document.getElementById('cfg_life_icon').value)}";
    function play(u) { const a = new Audio(u); a.volume = document.getElementById('vol').value; a.play().catch(()=>{}); }
    function renderLives() {
      const b = document.getElementById('lives-box'); b.innerHTML = '';
      for(let i=0; i<currentLives; i++) {
        if(lIcon.includes('/') || lIcon.includes('.')) b.innerHTML += '<img src="'+lIcon+'" class="life-icon-img">';
        else b.innerHTML += '<span style="font-size: 24px;">'+lIcon+'</span>';
      }
    }
    function init() {
      const sl = document.getElementById('slots'), ly = document.getElementById('layer');
      questions.forEach((_, i) => sl.innerHTML += '<div class="slot" id="s-'+i+'"></div>');
      let cells = []; for(let r=0; r<6; r++) for(let c=0; c<8; c++) cells.push({r, c});
      cells.sort(() => Math.random() - 0.5);
      questions.forEach((q, i) => {
        const g = document.createElement('div'); g.className = 'glyph';
        g.style.backgroundImage = 'url("'+(glyphImgs[i % glyphImgs.length])+'")';
        const cell = cells[i], jX = (Math.random()-0.5)*10, jY = (Math.random()-0.5)*10;
        g.style.left = (10 + (cell.c * 10) + 5 + jX) + '%'; g.style.top = (25 + (cell.r * 10) + 5 + jY) + '%';
        g.setAttribute('data-q', q.w); g.setAttribute('data-correct', q.a);
        g.setAttribute('data-opts', JSON.stringify(q.opts));
        g.innerHTML = '<div class="progress-container"></div>'; ly.appendChild(g);
      }); renderLives();
    }
    window.onmousemove = (e) => {
      const x = e.clientX, y = e.clientY;
      document.getElementById('scarab').style.left = x+'px'; document.getElementById('scarab').style.top = y+'px';
      document.getElementById('darkness').style.background = 'radial-gradient(circle 200px at '+x+'px '+y+'px, transparent 10%, rgba(0,0,0,0.98) 100%)';
      if(document.getElementById('modal').style.display === 'block' || currentLives<=0) return;
      let found = false;
      document.querySelectorAll('.glyph:not(.done)').forEach(g => {
        const r = g.getBoundingClientRect(), d = Math.hypot(x-(r.left+32), y-(r.top+32));
        if(d < 150) g.style.opacity = 1 - (d/150);
        if(d < 35) { found = true; if(currG !== g) start(g); }
      }); if(!found) stop();
    };
    function start(g) { stop(); currG = g; g.classList.add('charging'); play(snds[0]);
      bar = new ProgressBar.Circle(g.querySelector('.progress-container'), { strokeWidth: ${document.getElementById('st_charge_width').value}, duration: ${document.getElementById('st_charge_dur').value}, color: '${document.getElementById('st_charge_clr').value}', trailColor: '${document.getElementById('st_charge_trail').value}', trailWidth: 1 });
      bar.animate(1, () => { if(currG===g) { 
        actA = g; 
        document.getElementById('q').innerText=g.getAttribute('data-q');
        const zone = document.getElementById('ans-zone'); zone.innerHTML = '';
        let opts = JSON.parse(g.getAttribute('data-opts'));
        if(opts.length === 1 && (opts[0].toLowerCase()==='true' || opts[0].toLowerCase()==='false')) opts = ["True", "False"];
        opts.sort(() => Math.random() - 0.5).forEach(o => {
            const b = document.createElement('button'); b.className = 'btn'; b.innerText = o;
            if(o.toLowerCase() === 'true') b.innerText = "${uiLang.t}"; if(o.toLowerCase() === 'false') b.innerText = "${uiLang.f}";
            b.onclick = () => ans(o); zone.appendChild(b);
        });
        document.getElementById('modal').style.display='block'; document.body.style.cursor='default'; 
        play(snds[1]); if(bar){bar.destroy(); bar=null;} currG = null;
      }});
    }
    function stop() { if(currG) currG.classList.remove('charging'); if(bar){bar.destroy(); bar=null;} currG=null; }
    window.ans = (val) => {
      if(!actA) return;
      const m = document.getElementById('modal'), s = document.getElementById('stage');
      if(val === actA.getAttribute('data-correct')) {
        m.style.display='none'; play(snds[2]); document.body.style.cursor='none';
        actA.classList.add('done'); actA.innerHTML = '';
        document.getElementById('s-'+coll).appendChild(actA);
        coll++; if(coll >= questions.length) { document.getElementById('win').style.display='block'; play(snds[4]); document.body.style.cursor='default'; }
      } else {
        currentLives--; renderLives(); play(snds[3]); m.style.display='none'; document.body.style.cursor='none';
        s.classList.add('shake'); setTimeout(()=>s.classList.remove('shake'), 400);
        if(currentLives<=0) { document.getElementById('fail').style.display='block'; document.body.style.cursor='default'; }
      } actA = null;
    }; init();
  <\/script>
</body>
</html>`;
